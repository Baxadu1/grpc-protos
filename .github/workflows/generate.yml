name: Generate gRPC Code

on:
  push:
    branches:
      - main
      - master
    #paths:
      #- 'proto/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protos Repo
        uses: actions/checkout@v4 # Обновлено до v4

      - name: Install Go
        uses: actions/setup-go@v5 # Обновлено до v5
        with:
          go-version: '1.22'
          cache: false # Отключаем поиск go.sum, так как его тут нет

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Code
        run: |
          mkdir -p gen
          # Важно: убедись, что пути к файлам совпадают с твоей структурой папок
          protoc --proto_path=proto \
            --go_out=gen --go_opt=paths=source_relative \
            --go-grpc_out=gen --go-grpc_opt=paths=source_relative \
            proto/payment/payment.proto \
            proto/order/order.proto

      - name: Push to Generated Repo
        env:
          GH_TOKEN: ${{ secrets.PROTO_GEN_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Клонируем второй репозиторий (замени твой-юзернейм)
          git clone https://x-access-token:${GH_TOKEN}@github.com/твой-юзернейм/grpc-generated.git target
          
          # Очищаем старые файлы в целевом репо (кроме .git и go.mod)
          find target -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'go.mod' -exec rm -rf {} +
          
          # Копируем свежесгенерированный код
          cp -r gen/* target/
          
          cd target
          git add .
          # Коммитим только если есть изменения, чтобы избежать ошибки Exit Code 1
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-generate code from protos"
            git push origin main
          else
            echo "No changes to commit"
          fi